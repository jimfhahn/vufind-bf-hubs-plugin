[Connection]
baseUrl = "https://id.loc.gov"
userAgent = "VuFind-BibframeHub/1.0"
timeout = 10
maxResults = 20

[Neo4j]
enabled = true
; From inside Docker, host.docker.internal reaches the host machine.
; neo4j-hubs-new (2026-04-30 LC bulk dump) listens on 7475/7688.
; The legacy neo4j-hubs container on 7474/7687 is kept for side-by-side comparison.
uri = "http://host.docker.internal:7475"
username = "neo4j"
password = "bibframe123"
database = "neo4j"

[Display]
validateUris = true
validationCacheTtl = 86400
maxDisplayResults = 15
