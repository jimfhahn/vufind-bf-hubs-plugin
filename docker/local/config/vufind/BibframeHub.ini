[Connection]
baseUrl = "https://id.loc.gov"
userAgent = "VuFind-BibframeHub/1.0"
timeout = 10
maxResults = 20

[Neo4j]
enabled = true
; From inside Docker, host.docker.internal reaches the host machine.
; neo4j-hubs-v2 (2026-05-05 LC bulk dump, loaded 2026-05-08) listens on 7476/7689.
; neo4j-hubs-new (2026-04-30 dump) on 7475/7688 is preserved for side-by-side comparison.
uri = "http://host.docker.internal:7476"
username = "neo4j"
password = "bibframe123"
database = "neo4j"

[Display]
validateUris = true
validationCacheTtl = 86400
maxDisplayResults = 15
