[Connection]
; Base URL for the LC Linked Data Service
baseUrl = "https://id.loc.gov"
; User-Agent header (LC requires this)
userAgent = "VuFind-BibframeHub/1.0"
; HTTP timeout in seconds
timeout = 10
; Maximum Hub results to fetch
maxResults = 20

[Neo4j]
; Production: Neo4j runs as a compose service named `neo4j`, reached over the
; internal Docker network on the standard HTTP port 7474 (NOT the dev host
; ports 7476/7689 and NOT host.docker.internal).
enabled = true
uri = "http://neo4j:7474"
username = "neo4j"
; Password is injected at deploy time. Keep this file's value in sync with the
; NEO4J_PASSWORD set in .env (used by docker-compose.prod.yml). Do not commit a
; real secret here.
password = "CHANGE_ME_MATCH_ENV"
database = "neo4j"

[Display]
validateUris = true
validationCacheTtl = 86400
maxDisplayResults = 15
