[Connection]
; Base URL for the LC Linked Data Service
baseUrl = "https://id.loc.gov"
; User-Agent header (LC requires this)
userAgent = "VuFind-BibframeHub/1.0"
; HTTP timeout in seconds
timeout = 10
; Maximum Hub results to fetch
maxResults = 20

[Neo4j]
; Neo4j is the primary data source (n10s-imported BIBFRAME Hubs graph).
; Set to true to enable.
enabled = true
; Neo4j connection URI (HTTP API on port 7474 or Bolt on 7687)
uri = "bolt://localhost:7687"
; Neo4j credentials
username = "neo4j"
password = "bibframe123"
; Neo4j database name
database = "neo4j"

[Display]
; Validate that Hub URIs resolve on id.loc.gov before displaying.
; The bulk TTL dataset may contain URIs that no longer exist.
; Uses cached HEAD requests so each URI is only checked once per TTL period.
validateUris = true
; How long (seconds) to cache a URI validation result. Default: 86400 (24 hours)
validationCacheTtl = 86400
; Maximum number of related works to display after validation
maxDisplayResults = 15
; Optional: override cache file path (default: VUFIND_LOCAL_DIR/cache/bibframehub_uri_validation.json)
; validationCachePath = ""
